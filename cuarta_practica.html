<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto JavaScript Original</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      color: #333;
      text-align: center;
    }

    nav {
      margin: 20px 0;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      background-color: #6C63FF;
      padding: 10px 15px;
      border-radius: 5px;
      margin: 0 5px;
      transition: background 0.3s;
    }

    nav a:hover {
      background-color: #4a42c7;
    }

    h1 {
      margin-top: 40px;
      font-size: 2.5em;
      color: #fff;
    }

    button {
      background-color: #ff6f61;
      border: none;
      color: white;
      padding: 15px 25px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.3s;
      margin-top: 20px;
    }

    button:hover {
      background-color: #e55b50;
      transform: scale(1.05);
    }

    /* Modal styles */
    #modal {
      display: none;
      position: fixed;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(3px);
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s;
    }

    #modalContent {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      position: relative;
      transform: scale(0.8);
      animation: scaleIn 0.3s forwards;
    }

    #closeBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 1.5em;
      cursor: pointer;
      color: #333;
      transition: color 0.3s;
    }

    #closeBtn:hover {
      color: #ff6f61;
    }

    @keyframes fadeIn {
      from { opacity: 0; } 
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; } 
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Primera</a>
    <a href="segunda_practica.html">Segunda</a>
    <a href="tercera_practica.html">Tercera</a>
    <a href="cuarta_practica.html">Cuarta</a>
    <a href="quinta_practica.html">Quinta</a>
  </nav>

  <h1>Proyecto JavaScript Original</h1>
  <h2>Modal Moderno</h2>
  <button id="openBtn">¡Ábreme!</button>

  <div id="modal">
    <div id="modalContent">
      <button id="closeBtn">&times;</button>
      <h3>¡Hola!</h3>
      <p>Este es un modal más moderno y estilizado.</p>
      <button id="actionBtn">Click aquí</button>
    </div>
  </div>

  <script>
    const modal = document.getElementById('modal');
    const openBtn = document.getElementById('openBtn');
    const closeBtn = document.getElementById('closeBtn');
    const actionBtn = document.getElementById('actionBtn');

    openBtn.addEventListener('click', () => {
      modal.style.display = 'flex';
    });

    closeBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    actionBtn.addEventListener('click', () => {
      alert('¡Has hecho clic en el botón del modal!');
    });

    // Cierra el modal al hacer clic fuera del contenido
    window.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });
  </script>
</body>
</html>
